edition: 3.0.0
name: resume-analyze-fc3
access: default

resources:
  resumeAnalyzeService:
    component: fc3
    props:
      region: cn-hangzhou
      functionName: resume-analyze-service
      description: AI resume analysis service based on FastAPI and OpenAI on Alibaba Cloud FC3
      runtime: python3.10
      handler: main.app
      code: ./

      # 该服务会执行 PDF 解析、JSON 序列化以及外部大模型调用。
      # 512 MB 在成本和稳定性之间比较均衡，足以覆盖当前简历分析场景。
      memorySize: 512

      # AI 调用链路包含公网访问和模型推理等待时间，明显长于普通 CRUD 接口。
      # 60 秒可以覆盖 PDF 解析 + LLM 请求 + 结果清洗，减少误判超时。
      timeout: 60

      # 调用外部大模型接口必须允许函数访问公网。
      internetAccess: true

      # 自动创建或复用日志配置，便于线上排查 PDF 解析失败、模型超时、
      # 以及结构化 JSON 解析异常等问题。
      logConfig: auto

      # 模型密钥与网关地址通过环境变量注入，避免把敏感配置写死在代码或 YAML 中。
      environmentVariables:
        OPENAI_API_KEY: ${env('OPENAI_API_KEY')}
        OPENAI_BASE_URL: ${env('OPENAI_BASE_URL')}
        OPENAI_MODEL: ${env('OPENAI_MODEL')}

      # FC3 标准 Python runtime 下，单实例多并发配置对非 custom runtime 不生效。
      # 对当前这种“PDF 解析 + 外部 LLM 调用”的服务，更关键的是限制函数总并发，
      # 以避免瞬时流量冲击上游模型配额、拉高延迟，或者造成成本失控。
      concurrencyConfig:
        reservedConcurrency: 10

      # 保留 1 个热实例，优先优化演示与评审阶段的首包时延。
      # 如果后续更强调成本而不是冷启动体验，可以将其调整为 0。
      scalingConfig:
        minInstances: 1

      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - OPTIONS
